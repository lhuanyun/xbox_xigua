name: Build Go App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: false # 关闭缓存，消灭 go.sum 警告

    - name: Build Executable
      # 加上隐藏窗口参数，并且统一输出名字为 GuideListener.exe
      run: go build -ldflags="-H windowsgui" -o GuideListener.exe main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GuideListener-Windows
        # 这里的名字和上面编译生成的名字保持一致
        path: GuideListener.exe
